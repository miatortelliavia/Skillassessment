:root {
  --yellow: #FFC800;
  --orange: #FF7800;
  --red: #D70000;
  --navy: #00005F;
  --sky: #55C3F0;
  --navy-light: #00007A;

* { box-sizing: border-box; margin: 0; padding: 0; }

body {

  color: var(--text);

}

.atom-bg {

}

.app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

.sidebar {

.nav-divider { height: 1px; background: var(--border); margin: 0.75rem 1.5rem; }

.ic { flex: 1; }
.iname { font-size: 11px; font-weight: 500; color: var(--text-muted); margin-bottom: 4px; }
.ilist { list-style: none; display: flex; flex-direction: column; gap: 3px; }

.tq-desc { font-size: 12px; color: var(--text-hint); margin-bottom: 0.875rem; line-height: 1.6; }

.peer-select-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }

.peer-select { width: 100%; max-width: 320px; border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; font-size: 14px; font-family: 'Space Grotesk', sans-serif; color: var(--text); background: var(--surface2); outline: none; cursor: pointer; appearance: none; transition: border-color 0.15s; }

.peer-warning { font-size: 12px; color: var(--orange); margin-top: 8px; font-family: 'JetBrains Mono', monospace; line-height:1.5; }

.intro-screen { max-width: 580px; }
.intro-screen h2 { font-size: 38px; font-weight: 300; line-height: 1.1; margin-bottom: 1.25rem; }
.intro-screen h2 em { font-style: italic; color: var(--yellow); }
.intro-screen p { color: var(--text-muted); margin-bottom: 0.75rem; line-height: 1.7; font-size: 14px; }
.mode-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 1.75rem 0; }
.mode-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: all 0.2s; text-align: left; }

.mode-card-title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
.mode-card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

.ni-wrap { margin-bottom: 1.5rem; }

.btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 24px; border-radius: 8px; font-size: 13.5px; font-weight: 500; font-family: 'Space Grotesk', sans-serif; cursor: pointer; transition: all 0.15s; border: none; letter-spacing: 0.02em; }

.score-chip { display: flex; align-items: center; gap: 6px; font-size: 12px; font-family: 'JetBrains Mono', monospace; }

.save-banner { background: rgba(255,200,0,0.08); border: 1px solid rgba(255,200,0,0.2); border-radius: 8px; padding: 0.875rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }

</style>
</head>

const CORE_BLOCKS = BLOCKS.filter(b=>b.skills);
const ALL_SKILLS = CORE_BLOCKS.flatMap(b=>b.skills);

// ─── STATE ───────────────────────────────────────────────────────────────────
let S = { name:'', mode:'', cur:0, scores:{}, teamAnswer:'', feedback:'', viewingTeam:false, peerTarget:'' };
let BIN_ID = null;
let DB = { submissions:[] };
let chartSelf=null, chartTeam=null;

// ─── JSONBIN API ──────────────────────────────────────────────────────────────
async function initDB() {
  // Try to find existing bin
  try {
    const r = await fetch(`${JSONBIN_BASE}/b?tagName=${BIN_NAME}`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await r.json();
    if(data.result && data.result.length > 0) {
      BIN_ID = data.result[0].record.metadata.id;
      await loadDB();
      return;
    }
  } catch(e) {}

  // Create new bin
  try {
    const r = await fetch(`${JSONBIN_BASE}/b`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY,
        'X-Bin-Name': BIN_NAME,
        'X-Bin-Private': 'true'
      },
      body: JSON.stringify({ submissions: [] })
    });
    const data = await r.json();
    BIN_ID = data.metadata.id;
    DB = { submissions: [] };
  } catch(e) {
    console.error('JSONBin init failed', e);
  }
}

async function loadDB() {
  if(!BIN_ID) return;
  try {
    const r = await fetch(`${JSONBIN_BASE}/b/${BIN_ID}/latest`, {
      headers: { 'X-Master-Key': JSONBIN_KEY }
    });
    const data = await r.json();
    DB = data.record || { submissions: [] };
  } catch(e) { console.error('loadDB failed', e); }
}

async function saveDB() {
  if(!BIN_ID) return;
  try {
    await fetch(`${JSONBIN_BASE}/b/${BIN_ID}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'X-Master-Key': JSONBIN_KEY
      },
      body: JSON.stringify(DB)
    });
  } catch(e) { console.error('saveDB failed', e); }
}

function slug(s){ return (s||'').toLowerCase().replace(/\s+/g,'_'); }

function upsertSubmission(obj) {
  if(!DB.submissions) DB.submissions = [];
  const key = obj.mode==='self' ? `self:${slug(obj.name)}` : `peer:${slug(obj.peerTarget)}:${slug(obj.name)}`;
  const idx = DB.submissions.findIndex(s=>s._key===key);
  const entry = { ...obj, _key:key, savedAt: new Date().toISOString() };
  if(idx>=0) DB.submissions[idx] = entry;
  else DB.submissions.push(entry);
}

async function saveMyData() {
  upsertSubmission({ name:S.name, mode:S.mode, peerTarget:S.peerTarget, scores:S.scores, teamAnswer:S.teamAnswer, feedback:S.feedback });
  await saveDB();
}

function getSelfs() { return (DB.submissions||[]).filter(s=>s.mode==='self'); }
function getPeers() { return (DB.submissions||[]).filter(s=>s.mode==='peer'); }

function loadMyData() {
  const key = `self:${slug(S.name)}`;
  const existing = (DB.submissions||[]).find(s=>s._key===key);
  if(existing) { S.scores=existing.scores||{}; S.teamAnswer=existing.teamAnswer||''; S.feedback=existing.feedback||''; return true; }
  return false;
}

// ─── NAV ─────────────────────────────────────────────────────────────────────
function renderNav() {
  const total = BLOCKS.length;
  const pct = S.viewingTeam ? 100 : (S.cur/(total-1))*100;
  document.getElementById('pb').style.width = pct+'%';
  document.getElementById('pbLabel').textContent = S.viewingTeam ? 'team view' : `${S.cur} / ${total-1}`;
  document.getElementById('sidebarName').textContent = S.name || '';
  const mi = document.getElementById('modeIndicator');
  if(S.mode==='self') mi.innerHTML='<span class="mode-indicator mode-self">◉ self-assessment</span>';
  else if(S.mode==='peer') mi.innerHTML=`<span class="mode-indicator mode-peer">◎ rating ${S.peerTarget}</span>`;
  else mi.innerHTML='';
  const el=document.getElementById('nav');
  el.innerHTML='';
  BLOCKS.forEach((b,i)=>{
    if(b.id==='intro') return;
    const done=b.skills&&b.skills.every(s=>{const sc=S.scores[s.id];return sc&&(sc.nr||sc.v);});
    const btn=document.createElement('button');
    btn.className='nav-item'+(!S.viewingTeam&&i===S.cur?' active':'')+(done?' done':'');
    btn.innerHTML=`<span class="nav-dot"></span>${b.navLabel}`;
    btn.onclick=()=>{S.viewingTeam=false;S.cur=i;render();};
    el.appendChild(btn);
  });
  const tb=document.getElementById('teamOverviewBtn');
  if(tb) tb.className='nav-special-btn'+(S.viewingTeam?' active':'');
}

// ─── SKILL CARD ───────────────────────────────────────────────────────────────
function skillCard(s) {
  const sc=S.scores[s.id]||{}, nr=sc.nr||false;
  const rb=[1,2,3,4,5].map(n=>`<button class="rb${sc.v===n?' s'+n:''}" data-s="${s.id}" data-v="${n}">${n}</button>`).join('');
  const ll=['Beginner','Adv.beg.','Practitioner','Guide','Catalyst'].map(n=>`<div class="ll">${n}</div>`).join('');
  const ind=s.indicators.map(ind=>`
    <div class="ind-level">
      <div class="in c${ind.level}">${ind.level}</div>
      <div class="ic">
        <div class="iname">${ind.name}</div>
        <ul class="ilist">${ind.items.map(it=>`<li>${it}</li>`).join('')}</ul>
      </div>
    </div>`).join('');
  return `<div class="skill-card">
    <div class="skill-card-header">
      <div>
        <div class="skill-id">${s.id}</div>
        <div class="skill-name">${s.name}</div>
        <div class="skill-subdesc">${s.desc}</div>
      </div>
      <button class="nr-btn${nr?' active':''}" data-s="${s.id}">${nr?'n/a':'mark n/a'}</button>
    </div>
    <div class="skill-body${nr?' dimmed':''}" id="body-${s.id}">
      <div class="rating-row">${rb}</div>
      <div class="lvl-labels">${ll}</div>
      <button class="ind-toggle" data-s="${s.id}"><span>▾</span> level indicators</button>
      <div class="ind-panel" id="ind-${s.id}">${ind}</div>
    </div>
  </div>`;
}

function footer(cur,total) {
  return `<div class="nav-footer">
    ${cur>1?`<button class="btn btn-g" id="prevBtn">← back</button>`:'<span></span>'}
    <span class="nav-ctr">${cur} of ${total-1}</span>
    <button class="btn btn-p" id="nextBtn">${cur===total-2?'see results →':'next →'}</button>
  </div>`;
}

function attachSkillEvents(block) {
  document.querySelectorAll('.rb').forEach(btn=>{
    btn.onclick=async()=>{
      const id=btn.dataset.s,val=parseInt(btn.dataset.v);
      if(!S.scores[id])S.scores[id]={};
      S.scores[id].v=val;
      document.querySelectorAll(`.rb[data-s="${id}"]`).forEach(b=>b.className='rb');
      btn.className=`rb s${val}`;
      await saveMyData();
    };
  });
  document.querySelectorAll('.nr-btn').forEach(btn=>{
    btn.onclick=async()=>{
      const id=btn.dataset.s;
      if(!S.scores[id])S.scores[id]={};
      const nr=!S.scores[id].nr;
      S.scores[id].nr=nr;
      btn.textContent=nr?'n/a':'mark n/a';
      btn.classList.toggle('active',nr);
      document.getElementById('body-'+id)?.classList.toggle('dimmed',nr);
      await saveMyData();
    };
  });
  document.querySelectorAll('.ind-toggle').forEach(btn=>{
    btn.onclick=()=>{
      const panel=document.getElementById('ind-'+btn.dataset.s);
      panel.classList.toggle('open');
      btn.querySelector('span').textContent=panel.classList.contains('open')?'▴':'▾';
    };
  });
  document.getElementById('nextBtn').onclick=()=>{S.cur++;render();window.scrollTo(0,0);};
  document.getElementById('prevBtn')&&(document.getElementById('prevBtn').onclick=()=>{S.cur--;render();window.scrollTo(0,0);});
}

// ─── SCREENS ─────────────────────────────────────────────────────────────────
async function renderMain() {
  const m=document.getElementById('main');
  const total=BLOCKS.length;
  if(S.viewingTeam){ await renderTeamOverview(m); return; }
  const b=BLOCKS[S.cur];

  // INTRO
  if(b.type==='intro') {
    await loadDB();
    const selfNames=getSelfs().map(s=>s.name);
    m.innerHTML=`<div class="intro-screen">
      <h2>Atom<br><em>Skills Assessment</em></h2>
      <p>Rate yourself or a colleague across 3 sample skills on a 1–5 scale. Level indicators are available inline for each skill. Results are saved automatically.</p>
      <div class="mode-cards">
        <div class="mode-card" id="modeCardSelf">
          <div class="mode-card-icon">◉</div>
          <div class="mode-card-title">Self-assessment</div>
          <div class="mode-card-desc">Rate your own skills honestly and reflect on your level.</div>
        </div>
        <div class="mode-card" id="modeCardPeer">
          <div class="mode-card-icon">◎</div>
          <div class="mode-card-title">Rate a colleague</div>
          <div class="mode-card-desc">Anonymously rate another team member's skills.</div>
        </div>
      </div>
      <div class="ni-wrap">
        <label>Your name</label>
        <input type="text" id="nameInput" placeholder="First name" value="${S.name}" />
      </div>
      <div id="peerTargetWrap" style="display:none">
        <div class="peer-select-wrap">
          <label>Who are you rating?</label>
          ${selfNames.length>0
            ?`<select class="peer-select" id="peerSelect">
                <option value="">— select a colleague —</option>
                ${selfNames.map(n=>`<option value="${n}"${S.peerTarget===n?' selected':''}>${n}</option>`).join('')}
              </select>`
            :`<p class="peer-warning">No self-assessments found yet.<br>Ask your colleagues to complete their self-assessment first, then come back to rate them.</p>`
          }
        </div>
      </div>
      <button class="btn btn-p" id="startBtn">begin →</button>
    </div>`;

    let selMode=S.mode||'';
    const cs=document.getElementById('modeCardSelf');
    const cp=document.getElementById('modeCardPeer');
    const pw=document.getElementById('peerTargetWrap');
    function upd(){
      cs.className='mode-card'+(selMode==='self'?' selected-self':'');
      cp.className='mode-card'+(selMode==='peer'?' selected-peer':'');
      pw.style.display=selMode==='peer'?'block':'none';
    }
    upd();
    cs.onclick=()=>{selMode='self';S.mode='self';upd();};
    cp.onclick=()=>{selMode='peer';S.mode='peer';upd();};
    document.getElementById('nameInput').oninput=e=>{S.name=e.target.value;};
    document.getElementById('peerSelect')&&(document.getElementById('peerSelect').onchange=e=>{S.peerTarget=e.target.value;});
    document.getElementById('startBtn').onclick=()=>{
      const n=document.getElementById('nameInput').value.trim();
      if(!n){document.getElementById('nameInput').focus();return;}
      if(!selMode) return;
      if(selMode==='peer'&&!S.peerTarget) return;
      S.name=n; S.mode=selMode;
      if(selMode==='self') loadMyData();
      else { S.scores={}; S.teamAnswer=''; S.feedback=''; }
      S.cur=1; render(); window.scrollTo(0,0);
    };
    return;
  }

  // TEAM QUESTION
  if(b.type==='team-q') {
    m.innerHTML=`
      <div class="block-tag">team level</div>
      <h2 class="block-title">Team-level <em>reflection</em></h2>
      <p class="block-desc">${b.desc}</p>
      <div class="team-q">
        <div class="tq-title">Collective strengths</div>
        <div class="tq-desc">What can we do together that none of us could do alone? Think about how our combination of skills, styles, and experiences creates something greater than the sum of parts.</div>
        <textarea class="tq-ta" id="teamAns" placeholder="Your thoughts…">${S.teamAnswer}</textarea>
      </div>
      ${footer(S.cur,total)}`;
    document.getElementById('teamAns').oninput=async e=>{S.teamAnswer=e.target.value;await saveMyData();};
    document.getElementById('nextBtn').onclick=()=>{S.cur++;render();window.scrollTo(0,0);};
    document.getElementById('prevBtn')&&(document.getElementById('prevBtn').onclick=()=>{S.cur--;render();window.scrollTo(0,0);});
    return;
  }

  // RESULTS
  if(b.type==='results') {
    await loadDB();
    const labels=CORE_BLOCKS.map(b=>b.navLabel);
    const selfData=CORE_BLOCKS.map(b=>{
      const vals=b.skills.map(s=>{const sc=S.scores[s.id]||{};return sc.nr?null:(sc.v||null);}).filter(v=>v!==null);
      return vals.length?Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10:0;
    });

    let peerData=null, peerCount=0;
    if(S.mode==='self') {
      const myPeers=getPeers().filter(p=>p.peerTarget===S.name);
      peerCount=myPeers.length;
      if(myPeers.length>0) {
        peerData=CORE_BLOCKS.map(b=>{
          const vals=[];
          myPeers.forEach(p=>b.skills.forEach(s=>{const sc=(p.scores||{})[s.id]||{};if(!sc.nr&&sc.v)vals.push(sc.v);}));
          return vals.length?Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10:0;
        });
      }
    }

    const detailRows=ALL_SKILLS.map(s=>{
      const sc=S.scores[s.id]||{};
      const sv=sc.nr?null:(sc.v||null);
      let peerVal=null;
      if(peerData) {
        const bIdx=CORE_BLOCKS.findIndex(b=>b.skills.some(x=>x.id===s.id));
        peerVal=bIdx>=0?peerData[bIdx]:null;
      }
      return `<div class="result-row">
        <div class="rl"><span>${s.id}</span>${s.name}</div>
        <div style="display:flex;gap:16px;align-items:center">
          ${sv?`<div class="score-chip"><div class="score-dot" style="background:#FFC800"></div><span style="color:#FFC800;font-weight:500">${sv}</span><span style="font-size:9px;color:var(--text-hint);margin-left:2px">self</span></div>`:`<span style="font-size:10px;color:var(--text-hint);font-family:'JetBrains Mono',monospace">N/A</span>`}
          ${peerVal?`<div class="score-chip"><div class="score-dot" style="background:#55C3F0"></div><span style="color:#55C3F0;font-weight:500">${peerVal}</span><span style="font-size:9px;color:var(--text-hint);margin-left:2px">peers</span></div>`:''}
        </div>
      </div>`;
    }).join('');

    m.innerHTML=`
      <div class="block-tag">results</div>
      <h2 class="block-title">${S.name?S.name+"'s":'Your'} <em>profile</em></h2>
      <p class="block-desc">${S.mode==='self'
        ?peerCount>0?`Your self-assessment with ${peerCount} peer rating${peerCount>1?'s':''} overlaid.`
        :'Your self-assessment. Peer ratings will appear once colleagues have rated you.'
        :`Your anonymous rating of ${S.peerTarget}.`}
      </p>
      ${S.mode==='self'?`<div class="save-banner">
        <p>✓ Saved. Go back at any time to update your answers.</p>
        <button class="btn btn-sky btn-sm" id="viewTeamBtn">team overview →</button>
      </div>`:''}
      <div class="results-header">
        <div class="legend-item"><div class="legend-line" style="background:#FFC800"></div>self-assessment</div>
        ${peerData?`<div class="legend-item"><div class="legend-line" style="background:#55C3F0"></div>peer average (${peerCount})</div>`:''}
      </div>
      <div class="radar-wrap">
        <h3>radar — average per block</h3>
        <canvas id="rc" height="290"></canvas>
      </div>
      <div class="results-detail">${detailRows}</div>
      ${S.mode==='self'?`<div class="fb-box">
        <h3>Pilot feedback</h3>
        <textarea class="tq-ta" id="fbArea" placeholder="How did the format feel? Were the level indicators useful? Anything missing?">${S.feedback}</textarea>
      </div>`:''}
      <div class="exp-row">
        <button class="btn btn-g" id="restBtn">start over</button>
      </div>`;

    document.getElementById('fbArea')&&(document.getElementById('fbArea').oninput=async e=>{S.feedback=e.target.value;await saveMyData();});
    document.getElementById('viewTeamBtn')&&(document.getElementById('viewTeamBtn').onclick=()=>{S.viewingTeam=true;render();});
    document.getElementById('restBtn').onclick=()=>{
      if(confirm('Clear your session and start over?')){
        S={name:'',mode:'',cur:0,scores:{},teamAnswer:'',feedback:'',viewingTeam:false,peerTarget:''};
        render();
      }
    };

    if(window.Chart) {
      if(chartSelf){chartSelf.destroy();chartSelf=null;}
      const datasets=[{
        label:'self',data:selfData,
        backgroundColor:'rgba(255,200,0,0.1)',borderColor:'#FFC800',borderWidth:2,
        pointBackgroundColor:'#FFC800',pointRadius:4
      }];
      if(peerData) datasets.push({
        label:`peer avg (${peerCount})`,data:peerData,
        backgroundColor:'rgba(85,195,240,0.08)',borderColor:'#55C3F0',borderWidth:2,
        borderDash:[5,4],pointBackgroundColor:'#55C3F0',pointRadius:4
      });
      chartSelf=new Chart(document.getElementById('rc'),{
        type:'radar',
        data:{labels,datasets},
        options:{
          responsive:true,
          scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10},color:'rgba(232,244,255,0.3)',backdropColor:'transparent'},grid:{color:'rgba(85,195,240,0.1)'},angleLines:{color:'rgba(85,195,240,0.1)'},pointLabels:{font:{size:11,family:'Space Grotesk'},color:'rgba(232,244,255,0.6)'}}},
          plugins:{legend:{display:datasets.length>1,position:'bottom',labels:{color:'rgba(232,244,255,0.6)',font:{size:11,family:'JetBrains Mono'},boxWidth:16,padding:16}}}
        }
      });
    }
    return;
  }

  // STANDARD SKILL BLOCK
  let html=`<div class="block-tag">block ${b.id}</div><h2 class="block-title">${b.title}</h2><p class="block-desc">${b.desc}</p>`;
  b.skills.forEach(s=>{html+=skillCard(s);});
  html+=footer(S.cur,total);
  m.innerHTML=html;
  attachSkillEvents(b);
}

// ─── TEAM OVERVIEW ────────────────────────────────────────────────────────────
async function renderTeamOverview(m) {
  m.innerHTML=`<div class="loading">loading team data…</div>`;
  await loadDB();
  const selfs=getSelfs(), peers=getPeers();
  const labels=CORE_BLOCKS.map(b=>b.navLabel);
  const names=selfs.map(s=>s.name);

  const chips=names.map(n=>{
    const ini=n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const pc=peers.filter(p=>p.peerTarget===n).length;
    return `<div class="person-chip"><div class="p-avatar">${ini}</div>${n}${pc>0?`<span class="p-count">${pc} peer${pc>1?'s':''}</span>`:''}</div>`;
  }).join('');

  const headerCells=names.map(n=>`<th style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-hint);padding:.5rem .75rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap">${n.split(' ')[0]}</th>`).join('');

  function cell(v) {
    if(!v) return `<td style="padding:.5rem .75rem;border-bottom:1px solid var(--border)"><span style="font-size:10px;color:var(--text-hint);font-family:'JetBrains Mono',monospace">—</span></td>`;
    const cols=['','rgba(85,195,240,0.5)','#55C3F0','#FF7800','#FFC800','#FFC800'];
    return `<td style="padding:.5rem .75rem;border-bottom:1px solid var(--border)"><span style="font-size:13px;font-family:'JetBrains Mono',monospace;font-weight:500;color:${cols[v]}">${v}</span></td>`;
  }

  const skillRows=ALL_SKILLS.map(s=>{
    const cells=names.map(n=>{
      const sub=selfs.find(x=>x.name===n);
      if(!sub) return cell(null);
      const sc=(sub.scores||{})[s.id]||{};
      if(sc.nr) return `<td style="padding:.5rem .75rem;border-bottom:1px solid var(--border)"><span style="font-size:10px;color:var(--text-hint);font-family:'JetBrains Mono',monospace">n/a</span></td>`;
      return cell(sc.v||null);
    }).join('');
    return `<tr><td style="font-size:12px;color:var(--text-muted);padding:.5rem .75rem;border-bottom:1px solid var(--border)"><span style="font-family:'JetBrains Mono',monospace;color:var(--yellow);font-size:10px;margin-right:6px">${s.id}</span>${s.name}</td>${cells}</tr>`;
  }).join('');

  const colors=['#FFC800','#55C3F0','#FF7800','#D70000','#89D5F5','#FFD440','#FF9D40'];
  const datasets=selfs.map((sub,i)=>{
    const data=CORE_BLOCKS.map(b=>{
      const vals=b.skills.map(s=>{const sc=(sub.scores||{})[s.id]||{};return sc.nr?null:(sc.v||null);}).filter(v=>v!==null);
      return vals.length?Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10:0;
    });
    const col=colors[i%colors.length];
    return{label:sub.name,data,backgroundColor:col+'18',borderColor:col,borderWidth:1.5,pointBackgroundColor:col,pointRadius:3};
  });

  const teamAvg=CORE_BLOCKS.map(b=>{
    const vals=[];
    selfs.forEach(sub=>b.skills.forEach(s=>{const sc=(sub.scores||{})[s.id]||{};if(!sc.nr&&sc.v)vals.push(sc.v);}));
    return vals.length?Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10:0;
  });
  if(selfs.length>1) datasets.push({label:'team avg',data:teamAvg,backgroundColor:'transparent',borderColor:'rgba(232,244,255,0.35)',borderWidth:2.5,borderDash:[4,3],pointBackgroundColor:'rgba(232,244,255,0.35)',pointRadius:3});

  const teamAnswers=selfs.filter(s=>s.teamAnswer).map(s=>`<div class="ta-card"><div class="ta-author">${s.name}</div><div class="ta-text">${s.teamAnswer}</div></div>`).join('');
  const feedbackItems=selfs.filter(s=>s.feedback).map(s=>`<div class="ta-card"><div class="ta-author">${s.name}</div><div class="ta-text">${s.feedback}</div></div>`).join('');

  m.innerHTML=`
    <div class="block-tag">team overview</div>
    <h2 class="block-title">Team <em>results</em></h2>
    <p class="block-desc">${selfs.length} self-assessment${selfs.length!==1?'s':''} · ${peers.length} peer rating${peers.length!==1?'s':''} · updates on refresh</p>
    <div class="who-row">${chips||'<span style="font-size:12px;color:var(--text-hint)">no submissions yet</span>'}</div>
    ${selfs.length>0?`
    <div class="section-wrap">
      <div class="section-title">radar — self-assessments + team average</div>
      <div class="radar-wrap"><canvas id="overviewRadar" height="320"></canvas></div>
    </div>
    <div class="section-wrap">
      <div class="section-title">individual scores by skill</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto">
        <table style="width:100%;border-collapse:collapse">
          <thead><tr>
            <th style="font-size:11px;font-family:'JetBrains Mono',monospace;color:var(--text-hint);padding:.5rem .75rem;text-align:left;border-bottom:1px solid var(--border)">skill</th>
            ${headerCells}
          </tr></thead>
          <tbody>${skillRows}</tbody>
        </table>
      </div>
    </div>
    ${teamAnswers?`<div class="section-wrap"><div class="section-title">team question — collective strengths</div>${teamAnswers}</div>`:''}
    ${feedbackItems?`<div class="section-wrap"><div class="section-title">pilot feedback</div>${feedbackItems}</div>`:''}
    <div class="exp-row"><button class="btn btn-g" id="refreshBtn">↻ refresh</button></div>`
    :'<p style="color:var(--text-hint);font-size:13px;font-family:\'JetBrains Mono\',monospace">no results yet — be the first to complete the assessment.</p>'}`;

  if(selfs.length>0&&window.Chart){
    if(chartTeam){chartTeam.destroy();chartTeam=null;}
    chartTeam=new Chart(document.getElementById('overviewRadar'),{
      type:'radar',
      data:{labels,datasets},
      options:{
        responsive:true,
        scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:10},color:'rgba(232,244,255,0.3)',backdropColor:'transparent'},grid:{color:'rgba(85,195,240,0.1)'},angleLines:{color:'rgba(85,195,240,0.1)'},pointLabels:{font:{size:11,family:'Space Grotesk'},color:'rgba(232,244,255,0.6)'}}},
        plugins:{legend:{position:'bottom',labels:{color:'rgba(232,244,255,0.6)',font:{size:11,family:'JetBrains Mono'},boxWidth:16,padding:12}}}
      }
    });
  }
  document.getElementById('refreshBtn')&&(document.getElementById('refreshBtn').onclick=()=>render());
}

// ─── INIT ────────────────────────────────────────────────────────────────────
async function render() { renderNav(); await renderMain(); }
document.getElementById('teamOverviewBtn').onclick=()=>{S.viewingTeam=true;render();};

initDB().then(()=>render());
</script>
</body>
</html>
