<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — Skills Analysis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
:root{--yellow:#FFC800;--orange:#FF7800;--red:#D70000;--sky:#55C3F0;--navy:#00005F;--navy-dark:#000040;--surface:#00003D;--surface2:#00004A;--surface3:#000830;--border:rgba(85,195,240,0.13);--border-bright:rgba(85,195,240,0.32);--text:#E8F4FF;--text-muted:rgba(232,244,255,0.62);--text-hint:rgba(232,244,255,0.32)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--surface);color:var(--text);min-height:100vh;font-size:16px;line-height:1.6;overflow-x:hidden}

/* Animated atom */
.atom-wrap{position:fixed;top:50%;right:-80px;transform:translateY(-50%);width:500px;height:500px;pointer-events:none;z-index:0}
.atom-nucleus{position:absolute;top:50%;left:50%;width:14px;height:14px;margin:-7px 0 0 -7px;background:var(--sky);border-radius:50%;opacity:.15;box-shadow:0 0 40px 12px rgba(85,195,240,0.06)}
.atom-orbit{position:absolute;top:50%;left:50%;border:1px solid var(--sky);border-radius:50%;opacity:.07}
.atom-orbit-1{width:300px;height:110px;margin:-55px 0 0 -150px;animation:orb1 14s linear infinite}
.atom-orbit-2{width:300px;height:110px;margin:-55px 0 0 -150px;animation:orb2 20s linear infinite}
.atom-orbit-3{width:300px;height:110px;margin:-55px 0 0 -150px;animation:orb3 28s linear infinite}
@keyframes orb1{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes orb2{from{transform:rotate(60deg)}to{transform:rotate(420deg)}}
@keyframes orb3{from{transform:rotate(120deg)}to{transform:rotate(480deg)}}

/* Subtle glow */
body::before{content:'';position:fixed;top:20%;left:-100px;width:500px;height:500px;background:radial-gradient(circle,rgba(85,195,240,0.03) 0%,transparent 70%);pointer-events:none;z-index:0}

.page{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:3rem 2rem 6rem}

/* Back */
.back-link{display:inline-flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-hint);text-decoration:none;letter-spacing:.08em;transition:color .15s;margin-bottom:2.5rem}
.back-link:hover{color:var(--sky)}

/* Header */
.header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:4rem;gap:2rem;flex-wrap:wrap}
.eyebrow{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--sky);margin-bottom:.75rem;display:flex;align-items:center;gap:8px}
.eyebrow::before{content:'';display:inline-block;width:16px;height:1px;background:var(--sky)}
h1{font-family:'Space Grotesk',sans-serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:300;line-height:1.05;color:var(--text)}
h1 em{font-style:italic;color:var(--sky)}
.header-meta{display:flex;flex-direction:column;align-items:flex-end;gap:8px;padding-top:.5rem}
.meta-chip{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-hint);background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:4px 10px}
.meta-chip span{color:var(--sky)}

/* Loading */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:1.5rem}
.loading-spinner{width:32px;height:32px;border:1.5px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-hint);letter-spacing:.08em}

/* Section */
.section{margin-bottom:4rem}
.section-header{display:flex;align-items:baseline;gap:1rem;margin-bottom:1.5rem;padding-bottom:.6rem;border-bottom:1px solid var(--border)}
.section-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.18em;color:var(--sky);opacity:.4}
.section-title{font-family:'Space Grotesk',sans-serif;font-size:1.2rem;font-weight:500;color:var(--text)}

/* People */
.people-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:3rem}
.person-pill{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:40px;padding:5px 14px 5px 5px;font-size:14px;color:var(--text-muted);transition:border-color .2s}
.person-pill:hover{border-color:var(--border-bright)}
.person-avatar{width:28px;height:28px;border-radius:50%;background:rgba(85,195,240,0.12);color:var(--sky);font-size:10px;font-weight:600;display:flex;align-items:center;justify-content:center;font-family:'JetBrains Mono',monospace}
.person-peers{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--yellow);margin-left:2px}

/* Charts */
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:700px){.chart-grid{grid-template-columns:1fr}}
.chart-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.5rem;transition:border-color .2s}
.chart-card:hover{border-color:var(--border-bright)}
.chart-card.full{grid-column:1/-1}
.chart-card-label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-hint);margin-bottom:1.25rem}

/* Bars */
.bar-section{display:flex;flex-direction:column;gap:10px}
.bar-row{display:flex;align-items:center;gap:12px}
.bar-label{font-family:'JetBrains Mono',monospace;font-size:11px;width:28px;flex-shrink:0;text-align:right}
.bar-track{flex:1;height:6px;background:rgba(255,255,255,0.04);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.bar-name{font-size:13px;color:var(--text-muted);width:150px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* Heatmap */
.heatmap-wrap{overflow-x:auto}
.heatmap-table{width:100%;border-collapse:collapse;min-width:500px}
.heatmap-table th{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-hint);padding:.4rem .6rem;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;letter-spacing:.06em}
.heatmap-table td{padding:.3rem .6rem;border-bottom:1px solid rgba(85,195,240,0.04);font-size:12px}
.heatmap-table td.skill-name-cell{color:var(--text-muted);white-space:nowrap}
.heatmap-table td.skill-name-cell .sid{font-family:'JetBrains Mono',monospace;color:var(--sky);font-size:10px;margin-right:6px;opacity:.6}
.heat-cell{display:inline-flex;align-items:center;justify-content:center;width:30px;height:24px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500}

/* Insight */
.insight-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
@media(max-width:700px){.insight-grid{grid-template-columns:1fr}}
.insight-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.5rem}
.insight-card.strengths{border-color:rgba(255,200,0,0.2)}
.insight-card.gaps{border-color:rgba(85,195,240,0.18)}
.insight-card-title{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;margin-bottom:1rem;color:var(--text-muted)}
.insight-item{display:flex;align-items:flex-start;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-muted)}
.insight-item:last-child{border-bottom:none}
.insight-score{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500;min-width:28px}

/* Pairs */
.pairs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.pair-card{background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.25rem;transition:border-color .2s}
.pair-card:hover{border-color:rgba(255,200,0,0.2)}
.pair-header{display:flex;align-items:center;gap:8px;margin-bottom:.75rem;font-size:14px;font-weight:500;flex-wrap:wrap}
.pair-arrow{color:var(--sky);font-size:13px}
.pair-skills{display:flex;flex-wrap:wrap;gap:5px}
.pair-skill-tag{font-family:'JetBrains Mono',monospace;font-size:10px;background:rgba(85,195,240,0.08);color:var(--sky);border:1px solid rgba(85,195,240,0.2);border-radius:3px;padding:2px 6px}

/* AI box */
.ai-box{background:var(--surface2);border:1px solid rgba(85,195,240,0.18);border-radius:12px;padding:2rem;position:relative;overflow:hidden}
.ai-box::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--sky),rgba(85,195,240,0.3),transparent)}
/* Decorative atom rings inside AI box */
.ai-box-atom{position:absolute;bottom:-60px;right:-60px;width:200px;height:200px;border:1px solid rgba(85,195,240,0.06);border-radius:50%;pointer-events:none}
.ai-box-atom::before{content:'';position:absolute;top:20px;left:20px;right:20px;bottom:20px;border:1px solid rgba(85,195,240,0.04);border-radius:50%}
.ai-header{display:flex;align-items:center;gap:10px;margin-bottom:1.5rem}
.ai-icon{width:30px;height:30px;background:rgba(85,195,240,0.1);border:1px solid rgba(85,195,240,0.2);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--sky)}
.ai-title{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:500;color:var(--text)}
.ai-subtitle{font-size:11px;color:var(--text-hint);font-family:'JetBrains Mono',monospace;letter-spacing:.05em}
.ai-content{font-size:15px;color:var(--text-muted);line-height:1.8}
.ai-content h3{font-family:'Space Grotesk',sans-serif;font-size:14px;font-weight:500;color:var(--sky);margin:1.5rem 0 .5rem;letter-spacing:.04em}
.ai-content h3:first-child{margin-top:0}
.ai-loading{display:flex;align-items:center;gap:10px;color:var(--text-hint);font-family:'JetBrains Mono',monospace;font-size:12px}
.ai-dot{width:5px;height:5px;border-radius:50%;background:var(--sky);animation:pulse 1.2s ease-in-out infinite}
.ai-dot:nth-child(2){animation-delay:.2s}
.ai-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}

/* Buttons */
.btn-analyze{display:inline-flex;align-items:center;gap:8px;padding:10px 22px;background:rgba(85,195,240,0.1);color:var(--sky);border:1px solid rgba(85,195,240,0.25);border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.06em;cursor:pointer;transition:all .15s;margin-top:1.25rem}
.btn-analyze:hover{background:rgba(85,195,240,0.18);border-color:rgba(85,195,240,0.45)}
.btn-analyze:disabled{opacity:.4;cursor:not-allowed}
.btn-refresh{display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:none;color:var(--text-hint);border:1px solid var(--border);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:11px;cursor:pointer;transition:all .15s;letter-spacing:.05em}
.btn-refresh:hover{border-color:var(--border-bright);color:var(--text-muted)}

.no-data{text-align:center;padding:4rem 2rem;color:var(--text-hint);font-family:'JetBrains Mono',monospace;font-size:13px}

.fade-in{opacity:0;transform:translateY(14px);animation:fadeIn .5s ease forwards}
@keyframes fadeIn{to{opacity:1;transform:translateY(0)}}
.fade-in:nth-child(1){animation-delay:.05s}
.fade-in:nth-child(2){animation-delay:.12s}
.fade-in:nth-child(3){animation-delay:.2s}
.fade-in:nth-child(4){animation-delay:.28s}
.fade-in:nth-child(5){animation-delay:.36s}
.fade-in:nth-child(6){animation-delay:.44s}
</style>
</head>
<body>

<div class="atom-wrap">
  <div class="atom-nucleus"></div>
  <div class="atom-orbit atom-orbit-1"></div>
  <div class="atom-orbit atom-orbit-2"></div>
  <div class="atom-orbit atom-orbit-3"></div>
</div>

<div class="page">
  <a class="back-link" href="index.html">← back to assessment</a>

  <div class="header fade-in">
    <div class="header-left">
      <div class="eyebrow">Team Skills Assessment</div>
      <h1>Team<br><em>Analysis</em></h1>
    </div>
    <div class="header-meta" id="headerMeta">
      <div class="meta-chip">loading…</div>
    </div>
  </div>

  <div id="content">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">loading team data…</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwQWs1cGuzob_PXLpS0n2cwszKIGJEPrKiipgQ2KDpEvwFPMik1yk5jDa0Hk_WhCXvPEA/exec';

const BLOCKS=[
  {id:'A',label:'Self-mastery',skills:['A1','A2','A3']},
  {id:'B',label:'Agile & Lean',skills:['B1','B2','B3']},
  {id:'C',label:'Coaching',skills:['C1','C2','C3']},
  {id:'D',label:'Facilitation',skills:['D1','D2','D3']},
  {id:'E',label:'Training',skills:['E1','E2','E3']},
  {id:'F',label:'Advising',skills:['F1','F2','F3']},
  {id:'G',label:'Leadership',skills:['G1','G2','G3']},
  {id:'H',label:'Transformation',skills:['H1','H2','H3']},
  {id:'I',label:'Project mgmt',skills:['I1','I2','I3']},
  {id:'J',label:'Communication',skills:['J1','J2','J3']},
];

const SKILL_NAMES={
  A1:'Emotional intelligence',A2:'Self-regulation',A3:'Personal transformation',
  B1:'Agile & Lean mindset',B2:'Frameworks & methods',B3:'Practices & tools',
  C1:'Coaching mindset',C2:'Coaching skills',C3:'Coaching teams',
  D1:'Facilitation design',D2:'Facilitation delivery',D3:'Digital facilitation',
  E1:'Didactic design',E2:'Training delivery',E3:'Mentoring',
  F1:'Trusted advisor',F2:'Stakeholder mgmt',F3:'Knowledge transfer',
  G1:'Visionary leadership',G2:'Servant leadership',G3:'Complex org leadership',
  H1:'Change design',H2:'Culture & learning',H3:'Sustainability',
  I1:'Planning & coordination',I2:'Documentation',I3:'Vendor management',
  J1:'Internal comms',J2:'External comms',J3:'Networking',
};

const ALL_SKILL_IDS=BLOCKS.flatMap(b=>b.skills);
let DB={submissions:[]};
let radarChart=null;

async function loadData(){
  try{const r=await fetch(GAS_URL);const data=await r.json();DB=data||{submissions:[]};}
  catch(e){console.error('load failed',e);}
}

function getSelfs(){return(DB.submissions||[]).filter(s=>s.mode==='self');}
function getPeers(){return(DB.submissions||[]).filter(s=>s.mode==='peer');}

function avgScore(sub,skillIds){
  const vals=skillIds.map(id=>{const sc=(sub.scores||{})[id]||{};return sc.nr?null:(sc.v||null);}).filter(v=>v!==null);
  return vals.length?Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10:null;
}

function blockAvg(sub,blockId){const block=BLOCKS.find(b=>b.id===blockId);return block?avgScore(sub,block.skills):null;}

function teamBlockAvg(selfs,blockId){
  const vals=selfs.map(s=>blockAvg(s,blockId)).filter(v=>v!==null);
  return vals.length?Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10:0;
}

function skillColor(v){
  if(!v)return'rgba(255,255,255,0.05)';
  if(v>=4.5)return'rgba(255,200,0,0.3)';
  if(v>=3.5)return'rgba(255,200,0,0.15)';
  if(v>=2.5)return'rgba(255,120,0,0.18)';
  if(v>=1.5)return'rgba(85,195,240,0.12)';
  return'rgba(85,195,240,0.06)';
}

function skillTextColor(v){
  if(!v)return'var(--text-hint)';
  if(v>=4.5)return'#FFC800';
  if(v>=3.5)return'#FFD440';
  if(v>=2.5)return'#FF7800';
  if(v>=1.5)return'#55C3F0';
  return'rgba(85,195,240,0.6)';
}

function render(){
  const selfs=getSelfs(),peers=getPeers();
  const content=document.getElementById('content');

  document.getElementById('headerMeta').innerHTML=`
    <div class="meta-chip"><span>${selfs.length}</span> self-assessments</div>
    <div class="meta-chip"><span>${peers.length}</span> peer ratings</div>
    <button class="btn-refresh" onclick="refreshData()">↻ refresh</button>
  `;

  if(selfs.length===0){content.innerHTML='<div class="no-data">No submissions yet — ask your team to complete the assessment first.</div>';return;}

  const colors=['#FFC800','#55C3F0','#FF7800','#D70000','#89D5F5','#FFD440','#FF9D40'];

  const peopleHtml=selfs.map(s=>{
    const ini=s.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const pc=peers.filter(p=>p.peerTarget===s.name).length;
    return`<div class="person-pill"><div class="person-avatar">${ini}</div>${s.name}${pc>0?`<span class="person-peers">${pc} peer${pc>1?'s':''}</span>`:''}</div>`;
  }).join('');

  const radarLabels=BLOCKS.map(b=>b.label);
  const radarDatasets=selfs.map((sub,i)=>{
    const col=colors[i%colors.length];
    return{label:sub.name,data:BLOCKS.map(b=>blockAvg(sub,b.id)||0),backgroundColor:col+'18',borderColor:col,borderWidth:1.5,pointBackgroundColor:col,pointRadius:3};
  });
  const teamAvgData=BLOCKS.map(b=>teamBlockAvg(selfs,b.id));
  if(selfs.length>1)radarDatasets.push({label:'Team avg',data:teamAvgData,backgroundColor:'transparent',borderColor:'rgba(232,244,255,0.35)',borderWidth:2.5,borderDash:[4,3],pointBackgroundColor:'rgba(232,244,255,0.35)',pointRadius:3});

  const blockBars=BLOCKS.map(b=>{
    const avg=teamBlockAvg(selfs,b.id);
    const pct=(avg/5)*100;
    const col=avg>=4?'#FFC800':avg>=3?'#FF7800':'#55C3F0';
    return`<div class="bar-row"><div class="bar-label" style="color:${col}">${avg.toFixed(1)}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div><div class="bar-name">${b.label}</div></div>`;
  }).join('');

  const skillAvgs=ALL_SKILL_IDS.map(id=>{
    const vals=selfs.map(s=>{const sc=(s.scores||{})[id]||{};return sc.nr?null:(sc.v||null);}).filter(v=>v!==null);
    return{id,name:SKILL_NAMES[id],avg:vals.length?Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10:0};
  });

  const sorted=[...skillAvgs].sort((a,b)=>b.avg-a.avg);
  const top5=sorted.slice(0,5);
  const bottom5=sorted.slice(-5).reverse();

  const strengthsHtml=top5.map(s=>`<div class="insight-item"><span class="insight-score" style="color:var(--yellow)">${s.avg.toFixed(1)}</span><span>${s.id} · ${s.name}</span></div>`).join('');
  const gapsHtml=bottom5.map(s=>`<div class="insight-item"><span class="insight-score" style="color:var(--sky)">${s.avg.toFixed(1)}</span><span>${s.id} · ${s.name}</span></div>`).join('');

  const heatHeaders=selfs.map(s=>`<th>${s.name.split(' ')[0]}</th>`).join('');
  const heatRows=ALL_SKILL_IDS.map(id=>{
    const cells=selfs.map(s=>{const sc=(s.scores||{})[id]||{};const v=sc.nr?null:(sc.v||null);return`<td><div class="heat-cell" style="background:${skillColor(v)};color:${skillTextColor(v)}">${v||'—'}</div></td>`;}).join('');
    return`<tr><td class="skill-name-cell"><span class="sid">${id}</span>${SKILL_NAMES[id]}</td>${cells}</tr>`;
  }).join('');

  let pairsHtml='';
  if(selfs.length>=2){
    const pairs=[];
    for(let i=0;i<selfs.length;i++){for(let j=0;j<selfs.length;j++){
      if(i===j)continue;
      const learner=selfs[i],teacher=selfs[j];
      const teachSkills=ALL_SKILL_IDS.filter(id=>{
        const tSc=(teacher.scores||{})[id]||{};const lSc=(learner.scores||{})[id]||{};
        const tv=tSc.nr?null:(tSc.v||null);const lv=lSc.nr?null:(lSc.v||null);
        return tv&&lv&&tv>=4&&tv-lv>=2;
      });
      if(teachSkills.length>0)pairs.push({learner:learner.name,teacher:teacher.name,skills:teachSkills});
    }}
    pairsHtml=pairs.length>0
      ?pairs.map(p=>`<div class="pair-card"><div class="pair-header"><span>${p.learner}</span><span class="pair-arrow">← learns from</span><span>${p.teacher}</span></div><div class="pair-skills">${p.skills.map(id=>`<span class="pair-skill-tag">${id} · ${SKILL_NAMES[id]}</span>`).join('')}</div></div>`).join('')
      :'<p style="color:var(--text-hint);font-size:13px;font-family:\'JetBrains Mono\',monospace">Not enough score gap between team members yet.</p>';
  }else{
    pairsHtml='<p style="color:var(--text-hint);font-size:13px;font-family:\'JetBrains Mono\',monospace">Need at least 2 team members to identify learning pairs.</p>';
  }

  content.innerHTML=`
    <div class="section fade-in">
      <div class="section-header"><span class="section-label">01</span><span class="section-title">Team members</span></div>
      <div class="people-row">${peopleHtml}</div>
    </div>
    <div class="section fade-in">
      <div class="section-header"><span class="section-label">02</span><span class="section-title">Skill profiles</span></div>
      <div class="chart-grid">
        <div class="chart-card full"><div class="chart-card-label">Radar — all team members per competency block</div><canvas id="radarCanvas" height="400"></canvas></div>
        <div class="chart-card full"><div class="chart-card-label">Team average per block</div><div class="bar-section">${blockBars}</div></div>
      </div>
    </div>
    <div class="section fade-in">
      <div class="section-header"><span class="section-label">03</span><span class="section-title">Team strengths & development areas</span></div>
      <div class="insight-grid">
        <div class="insight-card strengths"><div class="insight-card-title">⬆ Top skills (team avg)</div>${strengthsHtml}</div>
        <div class="insight-card gaps"><div class="insight-card-title">⬇ Development opportunities</div>${gapsHtml}</div>
      </div>
    </div>
    <div class="section fade-in">
      <div class="section-header"><span class="section-label">04</span><span class="section-title">Full skill heatmap</span></div>
      <div class="chart-card"><div class="chart-card-label">All 30 skills — individual scores</div><div class="heatmap-wrap"><table class="heatmap-table"><thead><tr><th>Skill</th>${heatHeaders}</tr></thead><tbody>${heatRows}</tbody></table></div></div>
    </div>
    <div class="section fade-in">
      <div class="section-header"><span class="section-label">05</span><span class="section-title">Learning partnerships</span></div>
      <div class="pairs-grid">${pairsHtml}</div>
    </div>
    <div class="section fade-in">
      <div class="section-header"><span class="section-label">06</span><span class="section-title">AI team analysis</span></div>
      <div class="ai-box" id="aiBox">
        <div class="ai-box-atom"></div>
        <div class="ai-header">
          <div class="ai-icon">◎</div>
          <div><div class="ai-title">Claude's team read</div><div class="ai-subtitle">strengths · gaps · dynamics · recommendations</div></div>
        </div>
        <div class="ai-content" id="aiContent"><p style="color:var(--text-hint);font-size:14px">Click below to generate an AI analysis of your team's skill profile, patterns, and recommendations.</p></div>
        <button class="btn-analyze" id="analyzeBtn" onclick="runAIAnalysis()">◎ generate AI analysis</button>
      </div>
    </div>
  `;

  if(window.Chart){
    if(radarChart){radarChart.destroy();radarChart=null;}
    radarChart=new Chart(document.getElementById('radarCanvas'),{
      type:'radar',
      data:{labels:radarLabels,datasets:radarDatasets},
      options:{responsive:true,scales:{r:{min:0,max:5,ticks:{stepSize:1,font:{size:11},color:'rgba(232,244,255,0.25)',backdropColor:'transparent'},grid:{color:'rgba(85,195,240,0.08)'},angleLines:{color:'rgba(85,195,240,0.08)'},pointLabels:{font:{size:12,family:'Space Grotesk'},color:'rgba(232,244,255,0.6)'}}},plugins:{legend:{position:'bottom',labels:{color:'rgba(232,244,255,0.6)',font:{size:12,family:'JetBrains Mono'},boxWidth:16,padding:16}}}}
    });
  }

  setTimeout(()=>{
    document.querySelectorAll('.bar-fill').forEach(el=>{const w=el.style.width;el.style.width='0';setTimeout(()=>el.style.width=w,50);});
  },200);
}

async function runAIAnalysis(){
  const btn=document.getElementById('analyzeBtn');
  const aiContent=document.getElementById('aiContent');
  btn.disabled=true;btn.textContent='analysing…';
  aiContent.innerHTML=`<div class="ai-loading"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div><span>Claude is reading your team data…</span></div>`;

  const selfs=getSelfs(),peers=getPeers();

  const teamData=selfs.map(s=>{
    const allSkillScores=ALL_SKILL_IDS.map(id=>{const sc=(s.scores||{})[id]||{};const v=sc.nr?'n/a':(sc.v||'—');return`${id}(${SKILL_NAMES[id]}):${v}`;}).join(', ');
    const blockScores=BLOCKS.map(b=>{const avg=blockAvg(s,b.id);return`${b.label}:${avg?avg.toFixed(1):'n/a'}`;}).join(', ');
    const wildcards=(s.wildcards||[]).filter(w=>w.name&&w.score).map(w=>`${w.name}:${w.score}`).join(', ');
    const peerRatings=peers.filter(p=>p.peerTarget===s.name);
    let peerSummary='none yet';
    if(peerRatings.length>0){
      peerSummary=`${peerRatings.length} peer rating(s) — `+BLOCKS.map(b=>{const vals=peerRatings.map(p=>blockAvg(p,b.id)).filter(v=>v!==null);return vals.length?`${b.label}:${(vals.reduce((a,c)=>a+c,0)/vals.length).toFixed(1)}`:null;}).filter(Boolean).join(', ');
      const peerSkillAvgs=ALL_SKILL_IDS.map(id=>{const vals=peerRatings.map(p=>{const sc=(p.scores||{})[id]||{};return sc.nr?null:(sc.v||null);}).filter(v=>v!==null);return vals.length?`${id}:${(vals.reduce((a,c)=>a+c,0)/vals.length).toFixed(1)}`:null;}).filter(Boolean).join(', ');
      peerSummary+=` | Peer skill avgs: ${peerSkillAvgs}`;
    }
    return`=== ${s.name} ===\nBlock averages: ${blockScores}\nAll 30 skills: ${allSkillScores}\n${wildcards?`Additional strengths: ${wildcards}`:''}Peer ratings: ${peerSummary}`;
  }).join('\n\n');

  const teamAnswers=selfs.map(s=>{
    const ta=s.teamAnswers||{};
    const parts=[ta.K1?`Collective strengths: "${ta.K1}"`:null,ta.K2?`Complementarity: "${ta.K2}"`:null,ta.K3?`Team culture: "${ta.K3}"`:null,ta.K4?`External reputation: "${ta.K4}"`:null,ta.K5?`Achievements: "${ta.K5}"`:null].filter(Boolean);
    return parts.length?`${s.name}:\n${parts.join('\n')}`:'';
  }).filter(Boolean).join('\n\n');

  const prompt=`You are analysing a team skills assessment for an agile coaching and transformation team. Scale: 1=Beginner, 2=Advanced beginner, 3=Practitioner, 4=Guide, 5=Catalyst.

TEAM SKILL DATA (self-assessments + peer ratings where available):
${teamData}

TEAM REFLECTIONS (open-ended):
${teamAnswers||'Not yet completed.'}

Provide a thoughtful, specific analysis with these sections:

### Team Strengths
What does this team do exceptionally well? 3–4 genuine strengths with specific skills and names.

### Development Opportunities
Where are the most significant gaps — individually and collectively? Be honest and constructive.

### Complementarity & Dynamics
How do members complement each other? Who balances whose gaps? Interesting patterns?

### Learning Partnerships
What meaningful learning exchanges would benefit this team most?

### Recommendations
3–5 concrete, actionable recommendations based on their actual data.

Be specific, reference actual scores and names. Direct and useful tone — this is a professional team.`;

  try{
    const response=await fetch(GAS_URL,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({type:'claude_analysis',prompt:prompt})
    });
    const data=await response.json();
    if(data.error){throw new Error(data.error);}
    const text=data.text||'No response received.';
    const rendered=text.replace(/### (.+)/g,'<h3>$1</h3>').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    aiContent.innerHTML=`<div class="ai-content">${rendered}</div>`;
    btn.textContent='↺ regenerate';btn.disabled=false;
  }catch(e){
    aiContent.innerHTML=`<p style="color:var(--orange);font-size:14px">Analysis failed — please try again. (${e.message})</p>`;
    btn.textContent='◎ try again';btn.disabled=false;
  }
}

async function refreshData(){
  document.getElementById('content').innerHTML='<div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">refreshing…</div></div>';
  await loadData();render();
}

loadData().then(()=>render());
</script>
</body>
</html>
