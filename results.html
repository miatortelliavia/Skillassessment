<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team — Skills Analysis</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

:root {
  --yellow: #FFC800;
  --orange: #FF7800;
  --red: #D70000;
  --sky: #55C3F0;
  --navy: #000040;
  --surface: #0A0A2E;
  --surface2: #12123A;
  --surface3: #1A1A48;
  --border: rgba(255,200,0,0.12);
  --border-bright: rgba(255,200,0,0.3);
  --text: #F0EDE4;
  --text-muted: rgba(240,237,228,0.6);
  --text-hint: rgba(240,237,228,0.3);
  --accent: #FFC800;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--surface);
  color: var(--text);
  min-height: 100vh;
  font-size: 16px;
  line-height: 1.6;
}

/* Grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,200,0,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,200,0,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  max-width: 1100px;
  margin: 0 auto;
  padding: 3rem 2rem 6rem;
}

/* Header */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 4rem;
  gap: 2rem;
  flex-wrap: wrap;
}

.header-left {}

.eyebrow {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--yellow);
  margin-bottom: .75rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.eyebrow::before {
  content: '';
  display: inline-block;
  width: 20px;
  height: 1px;
  background: var(--yellow);
}

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(2.5rem, 5vw, 4rem);
  font-weight: 800;
  line-height: 1.0;
  letter-spacing: -.02em;
  color: var(--text);
}

h1 em {
  font-style: italic;
  color: var(--yellow);
  font-weight: 700;
}

.header-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}

.meta-chip {
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-hint);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 5px 12px;
}

.meta-chip span {
  color: var(--yellow);
  font-weight: 500;
}

/* Loading state */
.loading-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  gap: 1.5rem;
}

.loading-spinner {
  width: 40px;
  height: 40px;
  border: 2px solid var(--border);
  border-top-color: var(--yellow);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.loading-text {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--text-hint);
  letter-spacing: .08em;
}

/* Section */
.section {
  margin-bottom: 4rem;
}

.section-header {
  display: flex;
  align-items: baseline;
  gap: 1rem;
  margin-bottom: 1.5rem;
  padding-bottom: .75rem;
  border-bottom: 1px solid var(--border);
}

.section-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--yellow);
}

.section-title {
  font-family: 'Syne', sans-serif;
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}

/* People chips */
.people-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 3rem;
}

.person-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 16px 6px 6px;
  font-size: 14px;
  color: var(--text-muted);
  transition: border-color .2s;
}

.person-pill:hover { border-color: var(--border-bright); }

.person-avatar {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(255,200,0,0.15);
  color: var(--yellow);
  font-size: 11px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
}

.person-peers {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--sky);
  margin-left: 4px;
}

/* Radar */
.chart-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

@media(max-width: 700px) { .chart-grid { grid-template-columns: 1fr; } }

.chart-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.75rem;
}

.chart-card.full { grid-column: 1 / -1; }

.chart-card-label {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--text-hint);
  margin-bottom: 1.25rem;
}

/* Bar chart */
.bar-section {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.bar-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.bar-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  color: var(--text-muted);
  width: 28px;
  flex-shrink: 0;
  text-align: right;
}

.bar-track {
  flex: 1;
  height: 8px;
  background: rgba(255,255,255,0.05);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
}

.bar-name {
  font-size: 13px;
  color: var(--text-muted);
  width: 160px;
  flex-shrink: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.bar-val {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  width: 28px;
  text-align: right;
  flex-shrink: 0;
}

/* Heatmap */
.heatmap-wrap {
  overflow-x: auto;
}

.heatmap-table {
  width: 100%;
  border-collapse: collapse;
  min-width: 500px;
}

.heatmap-table th {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--text-hint);
  padding: .4rem .6rem;
  text-align: left;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
  letter-spacing: .06em;
}

.heatmap-table td {
  padding: .35rem .6rem;
  border-bottom: 1px solid rgba(255,200,0,0.04);
  font-size: 13px;
}

.heatmap-table td.skill-name-cell {
  color: var(--text-muted);
  font-size: 12px;
  white-space: nowrap;
}

.heatmap-table td.skill-name-cell .sid {
  font-family: 'DM Mono', monospace;
  color: var(--yellow);
  font-size: 10px;
  margin-right: 6px;
  opacity: .7;
}

.heat-cell {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 26px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
}

/* Strengths & gaps */
.insight-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1.5rem;
}

@media(max-width: 700px) { .insight-grid { grid-template-columns: 1fr; } }

.insight-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
}

.insight-card.strengths { border-color: rgba(255,200,0,0.25); }
.insight-card.gaps { border-color: rgba(85,195,240,0.2); }

.insight-card-title {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 1rem;
  display: flex;
  align-items: center;
  gap: 8px;
}

.insight-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: .6rem 0;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
  color: var(--text-muted);
}

.insight-item:last-child { border-bottom: none; }

.insight-score {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  min-width: 28px;
}

/* Learning pairs */
.pairs-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1rem;
}

.pair-card {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem;
  transition: border-color .2s;
}

.pair-card:hover { border-color: var(--border-bright); }

.pair-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: .75rem;
  font-size: 14px;
  font-weight: 500;
}

.pair-arrow {
  color: var(--yellow);
  font-size: 16px;
}

.pair-skills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.pair-skill-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  background: rgba(255,200,0,0.08);
  color: var(--yellow);
  border: 1px solid rgba(255,200,0,0.2);
  border-radius: 3px;
  padding: 2px 7px;
}

/* AI Analysis */
.ai-box {
  background: var(--surface2);
  border: 1px solid rgba(255,200,0,0.2);
  border-radius: 16px;
  padding: 2rem;
  position: relative;
  overflow: hidden;
}

.ai-box::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 2px;
  background: linear-gradient(90deg, var(--yellow), var(--orange), transparent);
}

.ai-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1.5rem;
}

.ai-icon {
  width: 32px;
  height: 32px;
  background: rgba(255,200,0,0.15);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
}

.ai-title {
  font-family: 'Syne', sans-serif;
  font-size: 16px;
  font-weight: 700;
}

.ai-subtitle {
  font-size: 12px;
  color: var(--text-hint);
  font-family: 'DM Mono', monospace;
}

.ai-content {
  font-size: 15px;
  color: var(--text-muted);
  line-height: 1.8;
  white-space: pre-wrap;
}

.ai-content h3 {
  font-family: 'Syne', sans-serif;
  font-size: 15px;
  font-weight: 700;
  color: var(--yellow);
  margin: 1.5rem 0 .5rem;
}

.ai-content h3:first-child { margin-top: 0; }

.ai-loading {
  display: flex;
  align-items: center;
  gap: 12px;
  color: var(--text-hint);
  font-family: 'DM Mono', monospace;
  font-size: 13px;
}

.ai-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--yellow);
  animation: pulse 1.2s ease-in-out infinite;
}
.ai-dot:nth-child(2) { animation-delay: .2s; }
.ai-dot:nth-child(3) { animation-delay: .4s; }

@keyframes pulse {
  0%, 100% { opacity: .2; transform: scale(.8); }
  50% { opacity: 1; transform: scale(1); }
}

.btn-analyze {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 12px 24px;
  background: var(--yellow);
  color: var(--navy);
  border: none;
  border-radius: 8px;
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all .15s;
  margin-top: 1rem;
}

.btn-analyze:hover { background: #FFD440; transform: translateY(-1px); }
.btn-analyze:disabled { opacity: .5; cursor: not-allowed; transform: none; }

.btn-refresh {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  background: none;
  color: var(--text-muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  cursor: pointer;
  transition: all .15s;
}

.btn-refresh:hover { border-color: var(--border-bright); color: var(--text); }

.back-link {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  color: var(--text-hint);
  text-decoration: none;
  letter-spacing: .06em;
  transition: color .15s;
  margin-bottom: 2rem;
}
.back-link:hover { color: var(--yellow); }

/* No data */
.no-data {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-hint);
  font-family: 'DM Mono', monospace;
  font-size: 14px;
}

/* Fade in */
.fade-in {
  opacity: 0;
  transform: translateY(16px);
  animation: fadeIn .5s ease forwards;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

.fade-in:nth-child(1) { animation-delay: .1s; }
.fade-in:nth-child(2) { animation-delay: .2s; }
.fade-in:nth-child(3) { animation-delay: .3s; }
.fade-in:nth-child(4) { animation-delay: .4s; }
.fade-in:nth-child(5) { animation-delay: .5s; }
</style>
</head>
<body>
<div class="page">

  <a class="back-link" href="index.html">← back to assessment</a>

  <div class="header fade-in">
    <div class="header-left">
      <div class="eyebrow">Team Skills Assessment</div>
      <h1>Team<br><em>Analysis</em></h1>
    </div>
    <div class="header-meta" id="headerMeta">
      <div class="meta-chip">loading…</div>
    </div>
  </div>

  <div id="content">
    <div class="loading-screen">
      <div class="loading-spinner"></div>
      <div class="loading-text">loading team data…</div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
// ════════════════════════════════════════════════
// CONFIG — same GAS URL as index.html
// ════════════════════════════════════════════════
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwQWs1cGuzob_PXLpS0n2cwszKIGJEPrKiipgQ2KDpEvwFPMik1yk5jDa0Hk_WhCXvPEA/exec';

// ════════════════════════════════════════════════
// SKILL DEFINITIONS (blocks + names)
// ════════════════════════════════════════════════
const BLOCKS = [
  {id:'A',label:'Self-mastery',skills:['A1','A2','A3']},
  {id:'B',label:'Agile & Lean',skills:['B1','B2','B3']},
  {id:'C',label:'Coaching',skills:['C1','C2','C3']},
  {id:'D',label:'Facilitation',skills:['D1','D2','D3']},
  {id:'E',label:'Training',skills:['E1','E2','E3']},
  {id:'F',label:'Advising',skills:['F1','F2','F3']},
  {id:'G',label:'Leadership',skills:['G1','G2','G3']},
  {id:'H',label:'Transformation',skills:['H1','H2','H3']},
  {id:'I',label:'Project mgmt',skills:['I1','I2','I3']},
  {id:'J',label:'Communication',skills:['J1','J2','J3']},
];

const SKILL_NAMES = {
  A1:'Emotional intelligence',A2:'Self-regulation',A3:'Personal transformation',
  B1:'Agile & Lean mindset',B2:'Frameworks & methods',B3:'Practices & tools',
  C1:'Coaching mindset',C2:'Coaching skills',C3:'Coaching teams',
  D1:'Facilitation design',D2:'Facilitation delivery',D3:'Digital facilitation',
  E1:'Didactic design',E2:'Training delivery',E3:'Mentoring',
  F1:'Trusted advisor',F2:'Stakeholder mgmt',F3:'Knowledge transfer',
  G1:'Visionary leadership',G2:'Servant leadership',G3:'Complex org leadership',
  H1:'Change design',H2:'Culture & learning',H3:'Sustainability',
  I1:'Planning & coordination',I2:'Documentation',I3:'Vendor management',
  J1:'Internal comms',J2:'External comms',J3:'Networking',
};

const ALL_SKILL_IDS = BLOCKS.flatMap(b => b.skills);

let DB = {submissions:[]};
let radarChart = null;

// ════════════════════════════════════════════════
// DATA
// ════════════════════════════════════════════════
async function loadData() {
  try {
    const r = await fetch(GAS_URL);
    const data = await r.json();
    DB = data || {submissions:[]};
  } catch(e) {
    console.error('load failed', e);
  }
}

function getSelfs() { return (DB.submissions||[]).filter(s=>s.mode==='self'); }
function getPeers() { return (DB.submissions||[]).filter(s=>s.mode==='peer'); }

function avgScore(sub, skillIds) {
  const vals = skillIds.map(id => {
    const sc = (sub.scores||{})[id]||{};
    return sc.nr ? null : (sc.v||null);
  }).filter(v=>v!==null);
  return vals.length ? Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10 : null;
}

function blockAvg(sub, blockId) {
  const block = BLOCKS.find(b=>b.id===blockId);
  return block ? avgScore(sub, block.skills) : null;
}

function teamBlockAvg(selfs, blockId) {
  const vals = selfs.map(s=>blockAvg(s,blockId)).filter(v=>v!==null);
  return vals.length ? Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10 : 0;
}

function skillColor(v) {
  if (!v) return 'rgba(255,255,255,0.06)';
  if (v >= 4.5) return 'rgba(255,200,0,0.35)';
  if (v >= 3.5) return 'rgba(255,200,0,0.2)';
  if (v >= 2.5) return 'rgba(255,120,0,0.2)';
  if (v >= 1.5) return 'rgba(85,195,240,0.15)';
  return 'rgba(85,195,240,0.08)';
}

function skillTextColor(v) {
  if (!v) return 'var(--text-hint)';
  if (v >= 4.5) return '#FFC800';
  if (v >= 3.5) return '#FFD440';
  if (v >= 2.5) return '#FF7800';
  if (v >= 1.5) return '#55C3F0';
  return 'rgba(85,195,240,0.6)';
}

// ════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════
function render() {
  const selfs = getSelfs();
  const peers = getPeers();
  const content = document.getElementById('content');

  // Update header meta
  document.getElementById('headerMeta').innerHTML = `
    <div class="meta-chip"><span>${selfs.length}</span> self-assessments</div>
    <div class="meta-chip"><span>${peers.length}</span> peer ratings</div>
    <button class="btn-refresh" onclick="refreshData()">↻ refresh</button>
  `;

  if (selfs.length === 0) {
    content.innerHTML = '<div class="no-data">No submissions yet — ask your team to complete the assessment first.</div>';
    return;
  }

  const colors = ['#FFC800','#55C3F0','#FF7800','#D70000','#89D5F5','#FFD440','#FF9D40'];

  // ── People ──────────────────────────────────────
  const peopleHtml = selfs.map(s => {
    const ini = s.name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const pc = peers.filter(p=>p.peerTarget===s.name).length;
    return `<div class="person-pill">
      <div class="person-avatar">${ini}</div>
      ${s.name}
      ${pc>0?`<span class="person-peers">${pc} peer${pc>1?'s':''}</span>`:''}
    </div>`;
  }).join('');

  // ── Radar data ──────────────────────────────────
  const radarLabels = BLOCKS.map(b=>b.label);
  const radarDatasets = selfs.map((sub,i) => {
    const col = colors[i % colors.length];
    return {
      label: sub.name,
      data: BLOCKS.map(b=>blockAvg(sub,b.id)||0),
      backgroundColor: col+'18',
      borderColor: col,
      borderWidth: 1.5,
      pointBackgroundColor: col,
      pointRadius: 3,
    };
  });
  const teamAvgData = BLOCKS.map(b=>teamBlockAvg(selfs,b.id));
  if (selfs.length > 1) {
    radarDatasets.push({
      label: 'Team avg',
      data: teamAvgData,
      backgroundColor: 'transparent',
      borderColor: 'rgba(240,237,228,0.4)',
      borderWidth: 2.5,
      borderDash: [4,3],
      pointBackgroundColor: 'rgba(240,237,228,0.4)',
      pointRadius: 3,
    });
  }

  // ── Block bar chart ──────────────────────────────
  const blockBars = BLOCKS.map(b => {
    const avg = teamBlockAvg(selfs, b.id);
    const pct = (avg/5)*100;
    const col = avg >= 4 ? '#FFC800' : avg >= 3 ? '#FF7800' : '#55C3F0';
    return `<div class="bar-row">
      <div class="bar-label" style="color:${col}">${avg.toFixed(1)}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${col}"></div></div>
      <div class="bar-name">${b.label}</div>
    </div>`;
  }).join('');

  // ── Skill bar chart (all skills, team avg) ───────
  const skillAvgs = ALL_SKILL_IDS.map(id => {
    const vals = selfs.map(s=>{const sc=(s.scores||{})[id]||{};return sc.nr?null:(sc.v||null);}).filter(v=>v!==null);
    return { id, name: SKILL_NAMES[id], avg: vals.length ? Math.round(vals.reduce((a,c)=>a+c,0)/vals.length*10)/10 : 0 };
  });

  const sorted = [...skillAvgs].sort((a,b)=>b.avg-a.avg);
  const top5 = sorted.slice(0,5);
  const bottom5 = sorted.slice(-5).reverse();

  const strengthsHtml = top5.map(s=>`<div class="insight-item">
    <span class="insight-score" style="color:var(--yellow)">${s.avg.toFixed(1)}</span>
    <span>${s.id} · ${s.name}</span>
  </div>`).join('');

  const gapsHtml = bottom5.map(s=>`<div class="insight-item">
    <span class="insight-score" style="color:var(--sky)">${s.avg.toFixed(1)}</span>
    <span>${s.id} · ${s.name}</span>
  </div>`).join('');

  // ── Heatmap ──────────────────────────────────────
  const heatHeaders = selfs.map(s=>`<th>${s.name.split(' ')[0]}</th>`).join('');
  const heatRows = ALL_SKILL_IDS.map(id => {
    const cells = selfs.map(s => {
      const sc = (s.scores||{})[id]||{};
      const v = sc.nr ? null : (sc.v||null);
      return `<td><div class="heat-cell" style="background:${skillColor(v)};color:${skillTextColor(v)}">${v||'—'}</div></td>`;
    }).join('');
    return `<tr>
      <td class="skill-name-cell"><span class="sid">${id}</span>${SKILL_NAMES[id]}</td>
      ${cells}
    </tr>`;
  }).join('');

  // ── Learning pairs ───────────────────────────────
  let pairsHtml = '';
  if (selfs.length >= 2) {
    const pairs = [];
    for (let i = 0; i < selfs.length; i++) {
      for (let j = 0; j < selfs.length; j++) {
        if (i === j) continue;
        const learner = selfs[i], teacher = selfs[j];
        const teachSkills = ALL_SKILL_IDS.filter(id => {
          const tSc = (teacher.scores||{})[id]||{};
          const lSc = (learner.scores||{})[id]||{};
          const tv = tSc.nr ? null : (tSc.v||null);
          const lv = lSc.nr ? null : (lSc.v||null);
          return tv && lv && tv >= 4 && tv - lv >= 2;
        });
        if (teachSkills.length > 0) {
          pairs.push({ learner: learner.name, teacher: teacher.name, skills: teachSkills });
        }
      }
    }
    pairsHtml = pairs.length > 0
      ? pairs.map(p=>`<div class="pair-card">
          <div class="pair-header">
            <span>${p.learner}</span>
            <span class="pair-arrow">← learns from</span>
            <span>${p.teacher}</span>
          </div>
          <div class="pair-skills">${p.skills.map(id=>`<span class="pair-skill-tag">${id} · ${SKILL_NAMES[id]}</span>`).join('')}</div>
        </div>`).join('')
      : '<p style="color:var(--text-hint);font-size:14px;font-family:\'DM Mono\',monospace">Not enough score gap between team members to identify clear learning pairs yet.</p>';
  } else {
    pairsHtml = '<p style="color:var(--text-hint);font-size:14px;font-family:\'DM Mono\',monospace">Need at least 2 team members to identify learning pairs.</p>';
  }

  // ── Assemble HTML ────────────────────────────────
  content.innerHTML = `
    <div class="section fade-in">
      <div class="section-header">
        <span class="section-label">01</span>
        <span class="section-title">Team members</span>
      </div>
      <div class="people-row">${peopleHtml}</div>
    </div>

    <div class="section fade-in">
      <div class="section-header">
        <span class="section-label">02</span>
        <span class="section-title">Skill profiles</span>
      </div>
      <div class="chart-grid">
        <div class="chart-card full">
          <div class="chart-card-label">Radar — all team members per competency block</div>
          <canvas id="radarCanvas" height="420"></canvas>
        </div>
        <div class="chart-card full">
          <div class="chart-card-label">Team average per block</div>
          <div class="bar-section">${blockBars}</div>
        </div>
      </div>
    </div>

    <div class="section fade-in">
      <div class="section-header">
        <span class="section-label">03</span>
        <span class="section-title">Team strengths & development areas</span>
      </div>
      <div class="insight-grid">
        <div class="insight-card strengths">
          <div class="insight-card-title">⬆ Top skills (team avg)</div>
          ${strengthsHtml}
        </div>
        <div class="insight-card gaps">
          <div class="insight-card-title">⬇ Development opportunities</div>
          ${gapsHtml}
        </div>
      </div>
    </div>

    <div class="section fade-in">
      <div class="section-header">
        <span class="section-label">04</span>
        <span class="section-title">Full skill heatmap</span>
      </div>
      <div class="chart-card">
        <div class="chart-card-label">All 30 skills — individual scores</div>
        <div class="heatmap-wrap">
          <table class="heatmap-table">
            <thead><tr><th>Skill</th>${heatHeaders}</tr></thead>
            <tbody>${heatRows}</tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="section fade-in">
      <div class="section-header">
        <span class="section-label">05</span>
        <span class="section-title">Learning partnerships</span>
      </div>
      <div class="pairs-grid">${pairsHtml}</div>
    </div>

    <div class="section fade-in">
      <div class="section-header">
        <span class="section-label">06</span>
        <span class="section-title">AI team analysis</span>
      </div>
      <div class="ai-box" id="aiBox">
        <div class="ai-header">
          <div class="ai-icon">✦</div>
          <div>
            <div class="ai-title">Claude's team read</div>
            <div class="ai-subtitle">Strengths · gaps · dynamics · recommendations</div>
          </div>
        </div>
        <div class="ai-content" id="aiContent">
          <p style="color:var(--text-hint);font-size:14px">Click below to generate an AI analysis of your team's skill profile, patterns, and recommendations.</p>
        </div>
        <button class="btn-analyze" id="analyzeBtn" onclick="runAIAnalysis()">✦ Generate AI analysis</button>
      </div>
    </div>
  `;

  // Draw radar
  if (window.Chart) {
    if (radarChart) { radarChart.destroy(); radarChart = null; }
    radarChart = new Chart(document.getElementById('radarCanvas'), {
      type: 'radar',
      data: { labels: radarLabels, datasets: radarDatasets },
      options: {
        responsive: true,
        scales: {
          r: {
            min: 0, max: 5,
            ticks: { stepSize: 1, font: {size:11}, color: 'rgba(240,237,228,0.25)', backdropColor: 'transparent' },
            grid: { color: 'rgba(255,200,0,0.08)' },
            angleLines: { color: 'rgba(255,200,0,0.08)' },
            pointLabels: { font: {size:12, family:'DM Sans'}, color: 'rgba(240,237,228,0.6)' }
          }
        },
        plugins: {
          legend: {
            position: 'bottom',
            labels: { color: 'rgba(240,237,228,0.6)', font: {size:12, family:'DM Mono'}, boxWidth:16, padding:16 }
          }
        }
      }
    });
  }

  // Animate bars
  setTimeout(() => {
    document.querySelectorAll('.bar-fill').forEach(el => {
      const w = el.style.width;
      el.style.width = '0';
      setTimeout(() => el.style.width = w, 50);
    });
  }, 200);
}

// ════════════════════════════════════════════════
// AI ANALYSIS
// ════════════════════════════════════════════════
async function runAIAnalysis() {
  const btn = document.getElementById('analyzeBtn');
  const aiContent = document.getElementById('aiContent');
  btn.disabled = true;
  btn.textContent = 'Analysing…';

  aiContent.innerHTML = `<div class="ai-loading">
    <div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div>
    <span>Claude is reading your team data…</span>
  </div>`;

  const selfs = getSelfs();
  const peers = getPeers();

  // Build compact data summary for the prompt
  const teamData = selfs.map(s => {
    const blockScores = BLOCKS.map(b => {
      const avg = blockAvg(s, b.id);
      return `${b.label}: ${avg ? avg.toFixed(1) : 'n/a'}`;
    }).join(', ');
    const topSkills = ALL_SKILL_IDS
      .map(id => ({id, v: (s.scores||{})[id]?.v}))
      .filter(x => x.v >= 4)
      .map(x => `${x.id}(${x.v})`)
      .join(' ');
    const lowSkills = ALL_SKILL_IDS
      .map(id => ({id, v: (s.scores||{})[id]?.v}))
      .filter(x => x.v && x.v <= 2)
      .map(x => `${x.id}(${x.v})`)
      .join(' ');
    const peerRatings = peers.filter(p=>p.peerTarget===s.name);
    const peerSummary = peerRatings.length > 0
      ? BLOCKS.map(b => {
          const vals = peerRatings.map(p=>blockAvg(p,b.id)).filter(v=>v!==null);
          return vals.length ? `${b.label}: ${(vals.reduce((a,c)=>a+c,0)/vals.length).toFixed(1)}` : null;
        }).filter(Boolean).join(', ')
      : 'none yet';
    return `${s.name}: [${blockScores}] | Top skills: ${topSkills||'none'} | Development: ${lowSkills||'none'} | Peer ratings: ${peerSummary}`;
  }).join('\n');

  const teamAnswers = selfs.map(s => {
    const ta = s.teamAnswers || {};
    return `${s.name}: Strengths="${ta.K1||''}" | Complementarity="${ta.K2||''}" | Culture="${ta.K3||''}" | Reputation="${ta.K4||''}" | Achievements="${ta.K5||''}"`;
  }).filter(s => s.length > 40).join('\n');

  const prompt = `You are analysing a team skills assessment for an agile coaching and transformation team. The scale is 1–5 (1=Beginner, 3=Practitioner, 5=Catalyst).

TEAM SKILL DATA (self-assessments + peer ratings where available):
${teamData}

TEAM REFLECTIONS (open-ended responses):
${teamAnswers || 'Not yet completed.'}

Please provide a thoughtful, specific analysis with these sections:

### Team Strengths
What does this team do exceptionally well collectively? Identify 3–4 genuine strengths with specific skills and names where relevant.

### Development Opportunities
Where are the most significant gaps — both individually and collectively? Be honest and constructive.

### Complementarity & Dynamics
How do team members complement each other? Who balances whose gaps? Are there interesting patterns?

### Learning Partnerships
Beyond the obvious score gaps, what meaningful learning exchanges would benefit this team most?

### Recommendations
3–5 concrete, actionable recommendations for this specific team based on their actual data.

Be specific, reference actual scores and names, and avoid generic advice. Keep the tone direct and useful — this is for a professional team that wants honest insight.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content?.find(c=>c.type==='text')?.text || 'No response received.';

    // Render markdown-ish headings
    const rendered = text
      .replace(/### (.+)/g, '<h3>$1</h3>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');

    aiContent.innerHTML = `<div class="ai-content">${rendered}</div>`;
    btn.textContent = '↺ Regenerate';
    btn.disabled = false;

  } catch(e) {
    aiContent.innerHTML = `<p style="color:var(--orange);font-size:14px">Analysis failed — please try again. (${e.message})</p>`;
    btn.textContent = '✦ Try again';
    btn.disabled = false;
  }
}

async function refreshData() {
  document.getElementById('content').innerHTML = `<div class="loading-screen"><div class="loading-spinner"></div><div class="loading-text">refreshing…</div></div>`;
  await loadData();
  render();
}

loadData().then(() => render());
</script>
